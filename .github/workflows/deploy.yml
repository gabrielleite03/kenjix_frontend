on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REPOSITORY: kenjix/frontend

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 🧠 Gerar versão (tag)
      - name: Gerar versão da build
        id: version
        run: |
          VERSION=$(date +%Y%m%d%H%M%S)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # 🔑 Login no ECR
      - name: Login no ECR
        uses: aws-actions/amazon-ecr-login@v2

      # 📦 Descobrir URI do repositório
      - name: Definir URI do ECR
        id: ecr
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_URI=$ACCOUNT_ID.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}
          echo "ECR_URI=$ECR_URI" >> $GITHUB_ENV
          echo "ecr_uri=$ECR_URI" >> $GITHUB_OUTPUT

      # 🐳 Build da imagem com versão
      - name: Build da imagem Docker
        run: |
          docker build -t $ECR_URI:$VERSION .
          docker tag $ECR_URI:$VERSION $ECR_URI:latest

      # 🚀 Push para o ECR
      - name: Push para ECR
        run: |
          docker push $ECR_URI:$VERSION
          docker push $ECR_URI:latest

      # 🔥 Criar arquivo .env (se ainda precisar)
      - name: Criar .env
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> .env
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> .env
          echo "AWS_REGION=${{ secrets.AWS_REGION }}" >> .env

          echo "MYSQL_USER=${{ secrets.MYSQL_USER }}" >> .env
          echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env
          echo "MYSQL_PORT=${{ secrets.MYSQL_PORT }}" >> .env
          echo "MYSQL_DATABASE_KENJIX=${{ secrets.MYSQL_DATABASE_KENJIX }}" >> .env

          echo "SECURITY_JWT_TOKEN_SECRET_KEY=${{ secrets.SECURITY_JWT_TOKEN_SECRET_KEY }}" >> .env
          echo "REAL_JWT_SECRET=${{ secrets.REAL_JWT_SECRET }}" >> .env
