name: Deploy

on:
  workflow_run:
    workflows: ["Build"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REPOSITORY_FRONTEND: kenjix/frontend
      ECS_CLUSTER: kenjix-cluster
      ECS_SERVICE: kenjix-ecs-frontend-service
      ECS_TASK_DEFINITION: kenjix-frontend-task

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      # 🔐 AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 🔐 Login ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 📥 Baixar task definition atual
      - name: Download task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_TASK_DEFINITION }} \
            --query taskDefinition \
            --output json > task-definition.json

      # 🧹 Limpar campos AWS gerados automaticamente
      - name: Clean task definition
        run: |
          jq 'del(
            .taskDefinitionArn,
            .revision,
            .status,
            .requiresAttributes,
            .compatibilities,
            .registeredAt,
            .registeredBy
          )' task-definition.json > clean-task-definition.json

      # 🔄 Atualizar imagens dos containers
      - name: Update container images
        run: |
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}

          jq --arg FRONTEND_IMAGE "$ECR_REGISTRY/${{ env.ECR_REPOSITORY_FRONTEND }}:latest" \
          '.containerDefinitions |= map(
            if .name == "kenjix-frontend" then
              .image = $FRONTEND_IMAGE
            else .
            end
          )' clean-task-definition.json > new-task-definition.json

      # 🚀 Registrar nova task definition E CAPTURAR ARN
      - name: Register task definition
        id: task-def
        run: |
          TASK_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://new-task-definition.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "TASK_ARN=$TASK_ARN" >> $GITHUB_ENV

      # 🔄 Atualizar ECS service com nova task EXPLICITAMENTE
      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --task-definition $TASK_ARN \
            --force-new-deployment

      # ⏳ Aguardar estabilização (evita falso "não iniciou")
      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }}