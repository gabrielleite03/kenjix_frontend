<div class="min-h-screen flex items-center justify-center bg-background-light p-6">
  <div class="w-full max-w-md">
    <!-- Logo and Title -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-24 h-24 bg-white rounded-2xl mb-4 mat-shadow overflow-hidden p-2">
        <svg viewBox="0 0 100 100" class="w-full h-full">
          <!-- Background Circle -->
          <circle cx="50" cy="50" r="42" fill="none" stroke="#f1f5f9" stroke-width="4" />
          <circle cx="50" cy="50" r="38" fill="none" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="2,2" />
          
          <!-- Animal Silhouettes (Simplified) -->
          <path d="M40 35 Q50 20 60 35 L55 45 L45 45 Z" fill="#f1f5f9" />
          
          <!-- Text -->
          <text x="50" y="48" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-weight="bold" font-size="22" fill="#A31D1D">Kenji</text>
          <text x="50" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="24" fill="#0f172a">Pet</text>
        </svg>
      </div>
      <h1 class="text-2xl font-black text-slate-800 tracking-tight">Kenji Pet Shop</h1>
      <p class="text-slate-500 text-sm">Painel Administrativo</p>
    </div>

    <!-- Login Card -->
    <div class="admin-card p-8">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
        @if (errorMessage()) {
          <div class="p-4 bg-rose-50 border border-rose-100 rounded-xl flex items-center gap-3 text-rose-600 text-sm font-bold animate-shake">
            <mat-icon class="text-lg">error_outline</mat-icon>
            {{ errorMessage() }}
          </div>
        }

        <div class="space-y-1">
          <label for="email" class="admin-label">E-mail</label>
          <div class="relative flex items-center">
            <input 
              id="email"
              type="email" 
              formControlName="email"
              class="admin-input"
              placeholder="seu@email.com"
            >
          </div>
        </div>

        <div class="space-y-1">
          <div class="flex items-center justify-between">
            <label for="password" class="admin-label">Senha</label>
          </div>
          <div class="relative flex items-center">
            <input 
              id="password"
              type="password" 
              formControlName="password"
              class="admin-input"
              placeholder="••••••••"
            >
          </div>
        </div>

        <button 
          type="submit" 
          [disabled]="loginForm.invalid || isLoading()"
          class="w-full py-3 bg-primary text-white rounded-xl font-bold mat-shadow hover:brightness-105 active:scale-95 transition-all disabled:opacity-50 disabled:grayscale disabled:scale-100 flex items-center justify-center gap-2"
        >
          @if (isLoading()) {
            <div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
            Entrando...
          } @else {
            Entrar no Painel
            <mat-icon>login</mat-icon>
          }
        </button>
      </form>

    <!-- Footer -->
    <p class="text-center mt-8 text-[10px] text-slate-400 font-bold uppercase tracking-widest">
      &copy; 2026 Kenji Pet Shop
    </p>
  </div>
</div>
