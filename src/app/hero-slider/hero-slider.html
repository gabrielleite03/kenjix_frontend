<div class="w-full max-w-[1440px] mx-auto px-8 mb-8">
  <swiper-container class="rounded-3xl overflow-hidden shadow-xl h-[80px] lg:h-[100px]" pagination="true"
    navigation="true" autoplay-delay="5000" loop="true"
    style="--swiper-navigation-color: #fff; --swiper-pagination-color: #fff; --swiper-navigation-size: 20px;">
    <swiper-slide class="!h-full">
      <div class="relative w-full h-full">
        <img src="https://picsum.photos/seed/pet-hero-1/1920/1080" alt="Promoção Ração Premium"
          class="w-full h-full object-cover" referrerpolicy="no-referrer">
        <div
          class="absolute inset-0 bg-gradient-to-r from-black/60 to-transparent flex flex-col justify-center px-4 lg:px-8 text-white">
          <span
            class="bg-accent text-white px-2 py-0.5 rounded-full text-[8px] font-bold uppercase tracking-widest w-fit mb-1">Oferta
            Especial</span>
          <h2 class="text-sm lg:text-lg font-black leading-tight max-w-md">Nutrição de Elite para seu Melhor Amigo</h2>
        </div>
      </div>
    </swiper-slide>

    <swiper-slide class="!h-full">
      <div class="relative w-full h-full">
        <img src="https://aws-s3-site-kejipet.s3.us-east-1.amazonaws.com/uploads/swipper/Gemini_Generated_Image_aqrduhaqrduhaqrd.png" alt="Acessórios Exclusivos"
          class="w-full h-full object-cover" referrerpolicy="no-referrer">
        <div
          class="absolute inset-0 bg-gradient-to-r from-black/60 to-transparent flex flex-col justify-center px-4 lg:px-8 text-white">
          <span
            class="bg-primary text-deep-teal px-2 py-0.5 rounded-full text-[8px] font-bold uppercase tracking-widest w-fit mb-1">Lançamento</span>
          <h2 class="text-sm lg:text-lg font-black leading-tight max-w-md">Estilo e Conforto em Cada Passeio</h2>
        </div>
      </div>
    </swiper-slide>

    <swiper-slide class="!h-full">
      <div class="relative w-full h-full">
        <img src="https://picsum.photos/seed/pet-hero-3/1920/1080" alt="Higiene e Bem-estar"
          class="w-full h-full object-cover" referrerpolicy="no-referrer">
        <div
          class="absolute inset-0 bg-gradient-to-r from-black/60 to-transparent flex flex-col justify-center px-4 lg:px-8 text-white">
          <span
            class="bg-emerald-500 text-white px-2 py-0.5 rounded-full text-[8px] font-bold uppercase tracking-widest w-fit mb-1">Cuidado
            Completo</span>
          <h2 class="text-sm lg:text-lg font-black leading-tight max-w-md">Higiene que Transforma o Dia a Dia</h2>
        </div>
      </div>
    </swiper-slide>
  </swiper-container>
</div>
